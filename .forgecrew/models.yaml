# ForgeCrew Model Definitions
# Each model defines a provider, capabilities, and cost tier.

models:
  gpt_5_5:
    provider: openai
    model: gpt-5.5
    api_key_env: OPENAI_API_KEY
    role: reasoning
    cost_tier: high
    supports_tools: true
    supports_vision: true

